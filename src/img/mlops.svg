<text x="235" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#00e5a0" font-weight="700">Naive Bayes</text>
<text x="235" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#5dcaa5">Scikit-learn</text>
<text x="235" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#1d9e75">TF-IDF  •  ~97% acc</text>

<line x1="300" y1="118" x2="328" y2="118" stroke="#00e5a0" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

