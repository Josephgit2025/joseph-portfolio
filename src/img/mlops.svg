<text x="385" y="133" text-anchor="middle" font-family="monospace" font-size="10" fill="#5dcaa5">REST endpoint</text>

<line x1="440" y1="118" x2="468" y2="118" stroke="#00e5a0" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

<rect x="470" y="90" width="175" height="56" rx="8" fill="#0f2318" stroke="#00e5a0" stroke-width="1"/>
<text x="557" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#00e5a0" font-weight="700">Docker  +  Drone CI</text>
