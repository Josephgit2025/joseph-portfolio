<text x="320" y="330" text-anchor="middle" font-family="monospace" font-size="10" fill="#9fe1cb" font-weight="700">{ "label": "HAM",  "score": 0.99 }</text>

<rect x="430" y="300" width="218" height="40" rx="6" fill="#050e08" stroke="#085041" stroke-width="0.5"/>
<text x="539" y="316" text-anchor="middle" font-family="monospace" font-size="9" fill="#5dcaa5">gitea  •  local registry</text>
<text x="539" y="330" text-anchor="middle" font-family="monospace" font-size="10" fill="#9fe1cb" font-weight="700">docker push → deploy</text>

<line x1="85" y1="146" x2="85" y2="298" stroke="#00e5a0" stroke-width="1" stroke-dasharray="3 3" opacity="0.3" marker-end="url(#arrow)"/>
<line x1="335" y1="251" x2="335" y2="298" stroke="#9fe1cb" stroke-width="1" stroke-dasharray="3 3" opacity="0.3" marker-end="url(#arrow)"/>
