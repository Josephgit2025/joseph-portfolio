<line x1="0" y1="333" x2="680" y2="333" stroke="#00e5a0" stroke-width="0.5" opacity="0.15"/>

<text x="340" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#00e5a0" opacity="0.5" font-weight="400">mlops-spam-detector  •  pipeline v1.0  •  acc ~97%</text>

<rect x="30" y="90" width="110" height="56" rx="8" fill="#0f2318" stroke="#00e5a0" stroke-width="1" opacity="0.9"/>
