<text x="85" y="133" text-anchor="middle" font-family="monospace" font-size="10" fill="#5dcaa5">ingress</text>

<line x1="140" y1="118" x2="168" y2="118" stroke="#00e5a0" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

