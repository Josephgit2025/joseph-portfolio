<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MLOps Spam Detector — pipeline cover image</title>
<desc>Visual pipeline: SMS data ingress → Naive Bayes model → FastAPI → Docker/Drone CI → MLflow tracking</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="400" rx="0" fill="#0d1117"/>
<rect x="0" y="0" width="680" height="400" fill="none" opacity="0.07"/>
